<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Slot Test</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            padding:20px;
        }
    </style>
</head>
<body>

<h1>🎰 Mini App Test</h1>

<div id="info">Загрузка...</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

    document.getElementById("info").innerHTML = `
        <b>Имя:</b> ${user.first_name}<br>
        <b>ID:</b> ${user.id}<br>
        <b>Username:</b> ${user.username || "нет"}<br>
    `;

}else{

    document.getElementById("info").innerHTML =
        "Данные Telegram не получены";

}

</script>

</body>
</html>
